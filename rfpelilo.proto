syntax = "proto3";

import "embedded_proto_options.proto";

package rfpelilo;
option java_package = "fr.gaellalire.arduino.protobuf";

message Empty {
}

message ErrorMessage {
  string text = 1 [(EmbeddedProto.options).maxLength = 200];
}

message SendRFRequest {
    uint32 modulation = 1;
    float frequency = 2;
    optional float deviation = 3;
    float dataRate = 4;
    bytes data = 5 [(EmbeddedProto.options).maxLength = 255];
    optional uint32 repeat = 6;
    optional uint32 repeatDelay = 7;
}

message ReceiveRFRequest {
    uint32 modulation = 1;
    float frequency = 2;
    optional float deviation = 3;
    float dataRate = 4;
    float bandwidth = 5;
    float rssiThreshold = 6;
    uint32 maxMessageLength = 7;
}

message ReceiveRFResponse {
    bytes data = 1 [(EmbeddedProto.options).maxLength = 255];
}

enum CommandStatus {
    OK = 0;

    /**< Common Errors */
    ERROR = 1; /**< Unknown error */
    RF_FREQUENCY_ERROR = 2;
    RF_FREQUENCY_DEVIATION_ERROR = 3;
    RF_DATA_RATE_ERROR = 4;
    RF_PACKET_LENGTH_ERROR = 5;
    RF_TRANSMIT_FAILED = 6;
}


message Main {
    uint32 command_id = 1;
    CommandStatus command_status = 2;
    bool has_next = 3;
    oneof content {
        Empty empty = 4;
        SendRFRequest send_rf_request = 5;
        ErrorMessage error_message = 6;
        ReceiveRFRequest receive_rf_request = 7;
        ReceiveRFResponse receive_rf_response = 8;
    }
}
